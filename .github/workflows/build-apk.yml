name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor project
        run: |
          npx cap init "Odysseus Dashboard" "com.odysseus.dashboard" --web-dir=www

      - name: Create www directory with index.html
        run: |
          mkdir -p www
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Odysseus</title></head><body><p>Loading...</p></body></html>' > www/index.html

      - name: Configure Capacitor for Tailscale IP
        run: |
          cat > capacitor.config.json << 'EOFCONFIG'
          {
            "appId": "com.odysseus.dashboard",
            "appName": "Odysseus Dashboard",
            "webDir": "www",
            "server": {
              "url": "http://100.95.214.69:7000",
              "cleartext": true,
              "androidScheme": "http"
            }
          }
          EOFCONFIG

      - name: Add Android platform
        run: npx cap add android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: odysseus-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
